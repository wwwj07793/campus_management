services:
  - type: web
    name: campus-management
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: INIT_DB_ON_STARTUP
        value: "true"
      - key: CAMPUS_AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./campus.db
