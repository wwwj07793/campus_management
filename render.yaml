services:
  - type: web
    name: campus-management
    env: docker
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: INIT_DB_ON_STARTUP
        value: "true"
      - key: CAMPUS_AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./campus.db
